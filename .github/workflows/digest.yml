name: Weekly big-story digest
on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays 13:00 UTC, adjust as you like
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Run big-story mode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SPRINGER_API_KEY: ${{ secrets.SPRINGER_API_KEY }}   # optional
        run: python -m radar bigstory
      - name: Commit results via PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain data/ docs/)" ]; then
            echo "no changes"; exit 0
          fi
          BRANCH="bot/bigstory-${{ github.run_id }}"
          git config user.name "research-radar bot"
          git config user.email "bot@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add data/ docs/
          git commit -m "weekly digest $(date -u +%F)"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "weekly digest $(date -u +%F)" \
            --body "Automated big-story digest update."
          for i in 1 2 3; do
            gh pr merge "$BRANCH" --merge --delete-branch && break || sleep 5
          done
