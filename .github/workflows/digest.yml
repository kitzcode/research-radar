name: Weekly big-story digest
on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays 13:00 UTC, adjust as you like
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run big-story mode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SPRINGER_API_KEY: ${{ secrets.SPRINGER_API_KEY }}   # optional
        run: python -m radar bigstory
      - name: Commit results
        run: |
          git config user.name "research-radar bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/
          git commit -m "weekly digest $(date -u +%F)" || echo "no changes"
          git push
